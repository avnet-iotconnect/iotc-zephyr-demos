# IOTCONNECT NXP eIQ Neutron NPU benchmark -- vendor-specific demo.
#
# = the vendor-neutral connectivity baseline (copied from the SDK telemetry
#   sample) + the eIQ/Neutron NPU model-build requirements (from
#   iotc-mcx-zephyr-demos). Board bearer settings live in boards/<board>.conf.
# The NPU-vs-CPU model is chosen by CONFIG_MCUX_HAS_NPU (default y); the CPU
# build is `-DEXTRA_CONF_FILE=cpu.conf`.

# === Connectivity: IOTCONNECT SDK ==========================================
CONFIG_IOTCONNECT=y
CONFIG_IOTCONNECT_DRA=y
# Device identity (override per device; reuse your POC account values).
CONFIG_IOTCONNECT_CPID=""
CONFIG_IOTCONNECT_ENV=""
CONFIG_IOTCONNECT_DUID=""
CONFIG_IOTCONNECT_CT_AWS=y
CONFIG_IOTCONNECT_DRA_DISCOVERY_HOST="awsdiscovery.iotconnect.io"

# --- Networking (native Zephyr IP stack) -----------------------------------
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=4
CONFIG_DNS_RESOLVER=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_POSIX_API=y

# --- TLS / mbedTLS ----------------------------------------------------------
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=60000
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=16384
CONFIG_MBEDTLS_PEM_PARSE_C=y
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256=y
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256=y
CONFIG_ENTROPY_GENERATOR=y

# --- MQTT / HTTP / SNTP -----------------------------------------------------
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_MQTT_KEEPALIVE=30
CONFIG_HTTP_CLIENT=y
CONFIG_SNTP=y
CONFIG_POSIX_TIMERS=y

# --- Settings / NVS ---------------------------------------------------------
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# === Edge AI: eIQ Neutron NPU model ========================================
CONFIG_MCUX_HAS_NPU=y
CONFIG_APP_TENSOR_ARENA_SIZE_KB=200

# TensorFlow Lite Micro is C++ and needs full libc++ + newlib. The vendor-
# neutral telemetry sample runs picolibc; the NPU model build cannot, so we
# switch libc here. Full newlib also restores FP printf for cJSON telemetry.
CONFIG_CPP=y
CONFIG_REQUIRES_FULL_LIBCPP=y
CONFIG_STD_CPP11=y
CONFIG_PICOLIBC=n
CONFIG_NEWLIB_LIBC=y
CONFIG_REQUIRES_FULL_LIBC=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# Neutron NPU + TFLM kernels use hardware floating point.
CONFIG_FPU=y
CONFIG_FP_HARDABI=y

# === libc / heap / stacks ===================================================
# The tensor arena is a static buffer (.bss), so stacks stay modest; the heap
# covers mbedTLS + cJSON + net buffers.
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_IOTCONNECT_THREAD_STACK_SIZE=4096

# === Logging ================================================================
CONFIG_LOG=y
CONFIG_IOTCONNECT_LOG_LEVEL_INF=y
CONFIG_APP_LOG_LEVEL=3
