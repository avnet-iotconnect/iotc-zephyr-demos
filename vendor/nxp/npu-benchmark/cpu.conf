# CPU (Cortex-M33) reference build -- same model topology, NO Neutron NPU.
#
#   west build -b frdm_mcxn947/mcxn947/cpu0 <app> -- -DEXTRA_CONF_FILE=cpu.conf ...
#
# Produces the "cpu-m33" accelerator label so the IOTCONNECT dashboard can chart
# CPU inference time alongside the default NPU build ("neutron-npu"). The delta
# between the two builds is the demo.
CONFIG_MCUX_HAS_NPU=n
