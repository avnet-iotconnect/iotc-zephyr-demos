# FRDM-IMX93 Cortex-A55 quickstart -- flash-and-provision, releasable image.
#
# Same Zephyr-on-A55 Ethernet path as demos/telemetry, but built as the
# QUICKSTART: NO baked-in device identity (only public CA roots), on-device EC
# P-256 keygen + self-signed cert, and the `iotcprov`/`iotc` provisioning shell.
# Anyone can write this SD image, provision it to THEIR IOTCONNECT account, and
# it connects -- no toolchain, no recompile.
#
# The A55 runs bare-metal from DRAM with no on-chip NVS flash, so the provisioned
# identity is persisted to a reserved sector region on the boot SD (usdhc2, disk
# "SD") via the SDK's disk-backed identity store (CONFIG_IOTCONNECT_IDENTITY_DISK).
#
# Board target: frdm_imx93/mimx9352/a55  (needs the aarch64-zephyr-elf toolchain
# and `spsdk`; build with USE_NXP_SPSDK_IMAGE=y for the bootable flash.bin).

# --- Bearer: native Ethernet (i.MX93 ENET, RGMII, Motorcomm YT8521 PHY) -----
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_NXP_ENET=y
CONFIG_MDIO=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_CONFIG_AUTO_INIT=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_CONTEXT_RCVTIMEO=y
CONFIG_MBEDTLS_HEAP_SIZE=60000

# --- Identity persistence: raw eMMC sector region (no NOR flash on this target).
#     The ROM boots from the removable SD (uSDHC2); the board doc says to use a
#     DIFFERENT uSDHC controller from Zephyr to avoid contending with the boot
#     controller, so we persist identity to the on-SOM eMMC (uSDHC1 -> disk
#     "SD2"). This overrides the settings/NVS backend the base prj.conf enables
#     for the MCU boards. -------------------------------------------------------
CONFIG_SETTINGS=n
CONFIG_SETTINGS_NVS=n
CONFIG_NVS=n
CONFIG_FLASH=n
CONFIG_FLASH_MAP=n
CONFIG_IOTCONNECT_IDENTITY_DISK=y
CONFIG_IOTCONNECT_IDENTITY_DISK_NAME="SD2"
# Reserve 16 sectors high on the 16 GB eMMC (sector 20,000,000 ~= 10 GB), well
# clear of any factory bootloader/partition table in the first few MB. The demo
# boots from the SD, so the eMMC user area is otherwise unused here.
CONFIG_IOTCONNECT_IDENTITY_DISK_SECTOR=20000000

# --- eMMC block access for the identity store (uSDHC1, on-SOM eMMC) ----------
CONFIG_DISK_ACCESS=y
CONFIG_DISK_DRIVER_MMC=y
CONFIG_MMC_STACK=y
CONFIG_SDHC=y
