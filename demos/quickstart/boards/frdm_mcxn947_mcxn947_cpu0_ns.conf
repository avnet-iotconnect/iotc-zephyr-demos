# FRDM-MCXN947 /ns (TF-M) board config for the quickstart -- Ethernet +
# HARDWARE-BACKED key protection. Crypto/entropy run in the TF-M secure world,
# so the non-secure app's mbedTLS heap + TLS buffers are trimmed to fit the
# smaller non-secure RAM partition and 256 KB MCUboot slot.

# --- Bearer: native Ethernet (ENET-QoS + LAN8741 RMII) ---------------------
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_NXP_ENET_QOS=y
CONFIG_ETH_NXP_ENET_QOS_MAC=y
CONFIG_MDIO=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_CONFIG_AUTO_INIT=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_SETTINGS=y

# --- TLS credentials live in RAM (VOLATILE backend). The device key is sealed
#     at rest in TF-M Protected Storage via the SDK identity blob; at connect
#     time it is loaded to RAM and referenced by the handshake. Do NOT use the
#     PROTECTED_STORAGE backend here: it would push all four TLS creds (broker
#     CA, DRA CA, device cert, device key) into the small TF-M PS partition,
#     overflow it, and leave the sec-tag empty (TLS_SEC_TAG_LIST -ENOENT). -----
CONFIG_TLS_CREDENTIALS_BACKEND_VOLATILE=y

# --- RNG: net stack sys_rand_get has no entropy device under TF-M -> timer.
#     Crypto uses the TF-M/PSA HW RNG. ----------------------------------------
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_TIMER_RANDOM_GENERATOR=y

# --- Trim NS RAM (secure world holds the heavy crypto) ---------------------
CONFIG_MBEDTLS_HEAP_SIZE=22000
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=8192
CONFIG_HEAP_MEM_POOL_SIZE=12288
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=48
CONFIG_NET_BUF_TX_COUNT=16

# --- Trim NS flash to fit the 256 KB non-secure MCUboot slot ---------------
CONFIG_SHELL_HELP=n
CONFIG_SHELL_HISTORY=n
CONFIG_SHELL_VT100_COMMANDS=n
CONFIG_SHELL_STATS=n
CONFIG_LOG_MODE_MINIMAL=y

# --- Keep the boot banner ON so we can see how far the NS app boots ---------
CONFIG_BOOT_BANNER=y

# --- ROOT-CAUSE FIX: the MCXN947 flash controller is unusable from the
#     non-secure world under TF-M, so the NS flash driver's PRE_KERNEL init
#     faults before the boot banner. Drop the entire NS flash/NVS/settings
#     stack; the device identity is sealed in TF-M PSA Protected Storage
#     instead (CONFIG_BUILD_WITH_TFM path in iotc_identity.c). --------------
CONFIG_FLASH=n
CONFIG_FLASH_MAP=n
CONFIG_NVS=n
CONFIG_SETTINGS=n
CONFIG_SETTINGS_NVS=n

# Quiet the ENET-QoS RX-starvation WRN so it does not flood the shell prompt
# (harmless LAN-broadcast drops while unprovisioned/idle).
CONFIG_ETHERNET_LOG_LEVEL_ERR=y


# --- TF-M PSA: to VERIFY the server's certificate chain and do the ECDHE key
#     agreement with the server's ephemeral public key, PSA must be able to
#     import PUBLIC keys. On-device keygen only enabled the *_KEY_PAIR types
#     (for our own key); without these the DRA/MQTT TLS handshake aborts
#     (-ECONNABORTED). Non-TF-M builds use software mbedTLS and don't need them.
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y
CONFIG_PSA_WANT_KEY_TYPE_RSA_PUBLIC_KEY=y

# --- DIAGNOSTIC: surface the raw mbedTLS handshake error (sockets_tls.c logs
#     "TLS handshake error: -0x%x" at NET_ERR before masking it to ECONNABORTED)
CONFIG_NET_LOG=y
CONFIG_NET_SOCKETS_LOG_LEVEL_ERR=y

# --- TF-M PSA: a full TLS handshake needs SHA-384/512 (AWS commonly negotiates
#     ECDHE-RSA-AES256-GCM-SHA384; the PRF + cert/ServerKeyExchange signatures
#     use SHA-384) and P-384 for ECDHE/ECDSA on some chains. On-device keygen
#     only enabled SHA-256/P-256, so the handshake failed in a PSA hash op
#     (mbedTLS -0x7F80 HW_ACCEL_FAILED). ---------------------------------------
CONFIG_PSA_WANT_ALG_SHA_384=y
CONFIG_PSA_WANT_ALG_SHA_512=y
CONFIG_PSA_WANT_ECC_SECP_R1_384=y


# The DRA flow opens sequential TLS connections (discovery then identity);
# give the net stack enough connection + context slots (TIME_WAIT overlap).
CONFIG_NET_MAX_CONN=8
CONFIG_NET_MAX_CONTEXTS=8

# --- Stacks -----------------------------------------------------------------
# Keep the MPU stack guard on (clean overflow detection). The shell stack must
# fit on-device EC keygen (iotcprov keygen). The C2D worker cJSON-parses inbound
# commands off the MQTT pump thread; keep it at the SDK default (not trimmed).
CONFIG_MPU_STACK_GUARD=y
CONFIG_SHELL_STACK_SIZE=6144
CONFIG_IOTCONNECT_C2D_WORKQ_STACK_SIZE=3072

