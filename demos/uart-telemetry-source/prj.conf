# IOTCONNECT UART telemetry-source -- common config (board-agnostic).
# Board-specific overrides, if any, live in boards/<board>.conf.

# Console output
CONFIG_PRINTK=y
CONFIG_LOG=y

# iotc-c-lib + cJSON allocate dynamically (routed to k_malloc/k_free).
CONFIG_HEAP_MEM_POOL_SIZE=32768

# cJSON serializes doubles via libc sprintf("%g") -> needs an FP-capable libc.
# Picolibc needs float printf explicitly enabled, else doubles print as "*float*".
CONFIG_PICOLIBC=y
CONFIG_PICOLIBC_IO_FLOAT=y

CONFIG_MAIN_STACK_SIZE=8192
