# SAM E54 Xplained Pro board config for the c2d-led demo -- ETHERNET bearer.
#
# The SAME54's GMAC is wired (RMII) to an onboard Microchip KSZ8091 PHY + RJ45,
# and the board devicetree already enables gmac/mdio/phy with the factory MAC
# address read from the onboard AT24MAC402 EEPROM (nvmem cell) -- so no overlay
# is needed. This .conf only turns on L2 + DHCPv4 so the interface
# self-configures and the SDK's connection manager sees L4 up.
#
# NOTE: this targets the legacy Atmel-tree board (`same54_xpro`), which has
# working Ethernet in Zephyr v4.4.1. Microchip's new-tree port of the same
# hardware (`sam_e54_xpro`) has no GMAC node yet; migrate when it lands.

# --- Bearer: native Ethernet (GMAC + KSZ8091 RMII) --------------------------
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_SAM_GMAC=y
CONFIG_MDIO=y

# --- IPv4 via DHCP; auto-bring-up the interface ----------------------------
CONFIG_NET_DHCPV4=y
CONFIG_NET_CONFIG_AUTO_INIT=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_SETTINGS=y

# --- Net buffers sized for a wired link ------------------------------------
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_CONTEXT_RCVTIMEO=y

# --- mbedTLS heap headroom for cloud broker cert chains --------------------
CONFIG_MBEDTLS_HEAP_SIZE=60000

# --- Software-crypto speed (no HW accel on SAME54) --------------------------
# Without the NIST-curve optimization, the ECDHE/ECDSA TLS handshake on this
# 120 MHz M4F overruns AWS IoT's ~10 s handshake window and mqtt_connect
# fails with -116 (hardware-observed). ROM AES tables trade flash for setup time.
CONFIG_MBEDTLS_ECP_NIST_OPTIM=y
CONFIG_MBEDTLS_AES_ROM_TABLES=y
