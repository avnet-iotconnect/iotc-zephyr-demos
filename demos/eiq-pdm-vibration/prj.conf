# eIQ PdM vibration capture -- network-free (I2C + console only).
CONFIG_PRINTK=y

# mikroBUS I2C + the FXLS8974 accelerometer via the Zephyr sensor API.
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_FXLS8974=y
CONFIG_FXLS8974_TRIGGER_NONE=y

# printk("%.4f", ...) needs float-capable libc output.
CONFIG_PICOLIBC=y
CONFIG_PICOLIBC_IO_FLOAT=y

CONFIG_MAIN_STACK_SIZE=4096
