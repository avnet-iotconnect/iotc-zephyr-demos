sample:
  name: eIQ PdM airflow dP capture
  description: >
    Capture differential-pressure time series from a MIKROE Ultra-Low Press
    (SDP810) Click on the FRDM-MCXN947 mikroBUS and print CSV for NXP eIQ Time
    Series Studio, to train an airflow anomaly / predictive-maintenance model.
tests:
  sample.iotconnect.eiq_pdm_airflow_capture:
    harness: console
    platform_allow:
      - frdm_mcxn947/mcxn947/cpu0
    harness_config:
      type: one_line
      regex:
        - "PDM,\\d+,.*"
    tags:
      - iotconnect
      - eiq
      - sensor
