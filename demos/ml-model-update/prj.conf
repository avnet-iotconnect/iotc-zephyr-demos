# ml-model-update demo - vendor-neutral baseline.
# Board-specific networking/bearer settings live in boards/<board>.conf.

# --- Turn on the SDK (selects the net/TLS/MQTT/SNTP/HTTP stack) -------------
CONFIG_IOTCONNECT=y
CONFIG_IOTCONNECT_DRA=y

# No identity is compiled in: the device is provisioned from the serial
# prompt (quickstart flow) -- iotcprov provision <duid>, register the printed
# cert, paste iotcDeviceConfig.json (iotc config), reboot.
CONFIG_IOTCONNECT_CPID=""
CONFIG_IOTCONNECT_ENV=""
CONFIG_IOTCONNECT_DUID=""
CONFIG_IOTCONNECT_CT_AWS=y
# Region-specific AWS discovery endpoint (from the device config package).
CONFIG_IOTCONNECT_DRA_DISCOVERY_HOST="awsdiscovery.iotconnect.io"

# --- On-device provisioning (identity in NVS + shell commands) --------------
CONFIG_IOTCONNECT_IDENTITY_NVS=y
CONFIG_IOTCONNECT_ONDEVICE_KEYGEN=y
CONFIG_IOTCONNECT_SHELL=y
CONFIG_MBEDTLS_USER_CONFIG_FILE="iotc_mbedtls_config.h"   # enables X509_CREATE_C
CONFIG_PSA_WANT_ALG_ECDSA=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_GENERATE=y
CONFIG_PSA_WANT_KEY_TYPE_ECC_KEY_PAIR_EXPORT=y
CONFIG_PSA_WANT_ECC_SECP_R1_256=y

# --- Shell (base64 cert/key + JSON paste need generous buffers) -------------
CONFIG_SHELL=y
CONFIG_SHELL_CMD_BUFF_SIZE=3072
CONFIG_SHELL_BACKEND_SERIAL_RX_RING_BUFFER_SIZE=4096
CONFIG_SHELL_STACK_SIZE=8192
CONFIG_KERNEL_SHELL=y

# --- Networking (native Zephyr IP stack) -----------------------------------
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_NET_SOCKETS_TLS_MAX_CONTEXTS=4
CONFIG_DNS_RESOLVER=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_POSIX_API=y

# --- TLS / mbedTLS (Zephyr 4.x symbol set) ---------------------------------
CONFIG_TLS_CREDENTIALS=y
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=60000
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=16384
CONFIG_MBEDTLS_PEM_PARSE_C=y
CONFIG_MBEDTLS_SSL_SERVER_NAME_INDICATION=y
# Ciphersuites: ECDHE-RSA covers AWS/Azure RSA broker roots; ECDHE-ECDSA covers
# ECC device/broker certs (common with IOTCONNECT). Both AES-128-GCM-SHA256.
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256=y
CONFIG_MBEDTLS_CIPHERSUITE_TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256=y
CONFIG_ENTROPY_GENERATOR=y

# --- MQTT / HTTP / SNTP -----------------------------------------------------
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_TLS=y
CONFIG_MQTT_KEEPALIVE=30
CONFIG_HTTP_CLIENT=y
CONFIG_SNTP=y

# --- Time (apply SNTP to realtime clock for cert validity) -----------------
CONFIG_POSIX_TIMERS=y

# --- Settings / NVS (identity + DRA cache persistence) ---------------------
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y
CONFIG_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# --- libc / heap / stacks ---------------------------------------------------
# Board default libc = picolibc. cJSON serializes telemetry doubles via libc
# sprintf("%g"); picolibc needs float printf explicitly enabled or doubles
# render as the literal "*float*".
CONFIG_PICOLIBC_IO_FLOAT=y
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=32768
CONFIG_IOTCONNECT_THREAD_STACK_SIZE=4096

# --- Logging ----------------------------------------------------------------
CONFIG_LOG=y
CONFIG_IOTCONNECT_LOG_LEVEL_INF=y

# ml-model-update: IO1 Xplained Pro sensors + LED, model blob handling.
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_ADC=y
# base64 decode of pushed model blobs; CRC32 validation of their weights.
CONFIG_BASE64=y
CONFIG_CRC=y
# C2D "reboot" command.
CONFIG_REBOOT=y

# Device vitals: append a "sys" object (CPU/heap/temp/uptime/reset) to telemetry.
CONFIG_IOTCONNECT_DEVICE_VITALS=y
