# FRDM-MCXN947 board overlay for the telemetry sample -- ETHERNET bearer.
#
# The MCXN947 ENET-QoS MAC is wired (RMII) to an onboard Microchip LAN8741 PHY
# + RJ45. The DT overlay (boards/frdm_mcxn947_mcxn947_cpu0.overlay) enables
# enet_mac / enet_mdio / phy; this .conf turns on the L2 + DHCPv4 so the
# interface self-configures and the SDK's connection manager sees L4 up.
#
# NOTE: there are known open Zephyr issues with MDIO/PHY bring-up on NXP MCXN
# ENET-QoS (zephyrproject-rtos/zephyr #92695, #94300). If the link never comes
# up at runtime that is a driver gap, not this config; verify the PHY MDIO
# address (overlay assumes 0) against board UM12018.

# --- Bearer: native Ethernet (ENET-QoS + LAN8741 RMII) ---------------------
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_NXP_ENET_QOS=y
CONFIG_ETH_NXP_ENET_QOS_MAC=y
CONFIG_MDIO=y

# --- IPv4 via DHCP; auto-bring-up the interface ----------------------------
CONFIG_NET_DHCPV4=y
CONFIG_NET_CONFIG_AUTO_INIT=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_SETTINGS=y

# --- Net buffers sized for a wired link ------------------------------------
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_CONTEXT_RCVTIMEO=y

# --- mbedTLS heap headroom for cloud broker cert chains --------------------
CONFIG_MBEDTLS_HEAP_SIZE=60000
