# FRDM-MCXN947 /ns (TF-M) board config for click-telemetry -- Ethernet +
# HARDWARE-BACKED key protection. Same TF-M model as the quickstart /ns build
# (crypto/entropy in the secure world; device key sealed in TF-M Protected
# Storage), plus the mikroBUS I2C + GPIO/REBOOT this demo needs. The device is
# provisioned once with the quickstart flow; click-telemetry loads that sealed
# identity via iotc_identity_load() (see src/main.c CONFIG_BUILD_WITH_TFM path).
#
# Requires the secure/non-secure RAM rebalance (secure 160 KB / NS 160 KB) --
# see iotc-zephyr-sdk/patches/README.md.

# --- Bearer: native Ethernet (ENET-QoS + LAN8741 RMII) ---------------------
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_NXP_ENET_QOS=y
CONFIG_ETH_NXP_ENET_QOS_MAC=y
CONFIG_MDIO=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_CONFIG_AUTO_INIT=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_SETTINGS=y

# --- Identity from the TF-M-sealed Protected Storage blob (iotc_identity_load).
#     Under BUILD_WITH_TFM this uses the PS backend, no NVS/settings needed. ---
CONFIG_IOTCONNECT_IDENTITY_NVS=y

# --- TLS credentials in RAM (VOLATILE); device key sealed at rest in TF-M PS,
#     loaded to RAM only for the handshake (see the quickstart /ns notes). -----
CONFIG_TLS_CREDENTIALS_BACKEND_VOLATILE=y

# --- RNG: net stack sys_rand_get has no entropy device under TF-M -> timer;
#     crypto uses the TF-M/PSA HW RNG. ----------------------------------------
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_TIMER_RANDOM_GENERATOR=y

# --- Trim NS RAM (the secure world holds the heavy crypto). The k-heap is a
#     touch larger than the quickstart's because the telemetry record spans
#     several Clicks (more cJSON nodes); the 160 KB NS partition has room. -----
# Match the quickstart's proven TLS memory profile exactly: the mbedTLS user
# config shrinks the TLS OUT buffer to 2 KB (the DRA/broker handshakes are
# server-auth or send only small client messages), which -- with the 8 KB IN
# buffer kept for the server's certificate flight -- lets the RSA-cert handshake
# complete inside a 22000-byte heap. Without it the symmetric 8 KB/8 KB buffers
# starve the handshake (PSA_ERROR_INSUFFICIENT_MEMORY -0x8d, then -0x7f80).
CONFIG_MBEDTLS_HEAP_SIZE=22000
CONFIG_MBEDTLS_SSL_MAX_CONTENT_LEN=8192
CONFIG_MBEDTLS_USER_CONFIG_FILE="iotc_mbedtls_config.h"
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=48
CONFIG_NET_BUF_TX_COUNT=16

# --- click-telemetry needs the mikroBUS I2C bus, the board LED (C2D commands),
#     reboot, and float printf so cJSON serializes the sensor doubles. --------
CONFIG_I2C=y
CONFIG_GPIO=y
CONFIG_REBOOT=y
CONFIG_PICOLIBC_IO_FLOAT=y

# --- Trim NS flash to fit the 256 KB non-secure MCUboot slot ---------------
CONFIG_SHELL_HELP=n
CONFIG_SHELL_HISTORY=n
CONFIG_SHELL_VT100_COMMANDS=n
CONFIG_SHELL_STATS=n
CONFIG_LOG_MODE_MINIMAL=y
CONFIG_BOOT_BANNER=y

# --- The MCXN947 flash controller is unusable from the non-secure world under
#     TF-M (NS flash driver faults in PRE_KERNEL init). Drop the NS flash/NVS/
#     settings stack; identity lives in TF-M PSA Protected Storage. -----------
CONFIG_FLASH=n
CONFIG_FLASH_MAP=n
CONFIG_NVS=n
CONFIG_SETTINGS=n
CONFIG_SETTINGS_NVS=n

# Quiet the ENET-QoS RX-starvation WRN (harmless LAN-broadcast drops).
CONFIG_ETHERNET_LOG_LEVEL_ERR=y

# --- TF-M PSA: import PUBLIC keys (verify server chain + peer ECDHE key) and
#     the SHA-384/512 + P-384 the AWS handshake can negotiate. ----------------
CONFIG_PSA_WANT_KEY_TYPE_ECC_PUBLIC_KEY=y
CONFIG_PSA_WANT_KEY_TYPE_RSA_PUBLIC_KEY=y
CONFIG_PSA_WANT_ALG_SHA_384=y
CONFIG_PSA_WANT_ALG_SHA_512=y
CONFIG_PSA_WANT_ECC_SECP_R1_384=y

# The ECDHE-ECDSA ciphersuite (from prj.conf) enables the legacy mbedTLS PK_C
# with ECDSA, and TF-PSA-crypto then requires MBEDTLS_ASN1_WRITE_C. The
# quickstart pulls that in via on-device keygen (MBEDTLS_X509_CRT_WRITE_C);
# click-telemetry does not do keygen, so enable the PK writer directly -- it
# is what defines MBEDTLS_ASN1_WRITE_C (config-tf-psa-crypto.h).
CONFIG_MBEDTLS_PK_WRITE_C=y

# Sequential DRA TLS connections (discovery then identity) need extra slots.
CONFIG_NET_MAX_CONN=8
CONFIG_NET_MAX_CONTEXTS=8

# --- Stacks: MPU guard on; C2D worker cJSON-parses inbound commands. --------
CONFIG_MPU_STACK_GUARD=y
CONFIG_IOTCONNECT_C2D_WORKQ_STACK_SIZE=3072
