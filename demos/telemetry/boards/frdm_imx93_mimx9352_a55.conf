# FRDM-IMX93 Cortex-A55 (arm64) board config for the telemetry demo -- ETHERNET.
#
# The i.MX93's Ethernet + Zephyr net support live on the A55 (the M33 has no
# Ethernet). The board DTS already enables the ENET MAC (RGMII) + Motorcomm
# YT8521 PHY, so this .conf just selects the NXP ENET driver + L2 + DHCPv4. The
# A55 runs bare-metal Zephyr from DRAM (U-Boot inits DDR, then the image is
# loaded to 0xd0000000), so there is NO NOR flash / NVS: identity comes from the
# compiled-in creds header (device_credentials.h), not runtime provisioning.
#
# Board target: frdm_imx93/mimx9352/a55  (needs the aarch64-zephyr-elf toolchain)

# --- Bearer: native Ethernet (i.MX93 ENET, RGMII, Motorcomm YT8521 PHY) -----
CONFIG_NET_L2_ETHERNET=y
CONFIG_ETH_NXP_ENET=y
CONFIG_MDIO=y

# --- IPv4 via DHCP; auto-bring-up the interface ----------------------------
CONFIG_NET_DHCPV4=y
CONFIG_NET_CONFIG_AUTO_INIT=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_SETTINGS=y

# --- Net buffers sized for a wired (gigabit-capable) link ------------------
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_CONTEXT_RCVTIMEO=y

# --- mbedTLS heap headroom for cloud broker cert chains --------------------
CONFIG_MBEDTLS_HEAP_SIZE=60000

# --- No NOR flash / NVS on this bare-metal A55 target: drop the persistence
#     stack and use the compiled-in identity (device_credentials.h). ---------
CONFIG_SETTINGS=n
CONFIG_SETTINGS_NVS=n
CONFIG_NVS=n
CONFIG_FLASH=n
CONFIG_FLASH_MAP=n
